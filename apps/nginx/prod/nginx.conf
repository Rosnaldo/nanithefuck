
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    sendfile on;

    server {
        listen 80;
        server_name nanithefuck.com.br www.nanithefuck.com.br;
        
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name nanithefuck.com.br www.nanithefuck.com.br;

        ssl_certificate /etc/letsencrypt/live/nanithefuck.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/nanithefuck.com.br/privkey.pem;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # NGINX compresses responses before sending them to the client (browser)
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_proxied expired no-cache no-store private auth;
        gzip_types
            text/plain
            text/css
            text/xml
            text/javascript
            application/javascript
            application/xml+rss
            application/json;

        # Main SPA
        location / {
            proxy_pass https://d1bg1gulylxih6.cloudfront.net;  # CloudFront domain
            proxy_set_header Host d1bg1gulylxih6.cloudfront.net; # S3/CloudFront expects its host
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 10s;
            proxy_read_timeout 30s;

            # Handle WebSockets or long-lived requests if needed
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Redirect /myadmin → /myadmin/
        location = /myadmin {
            return 301 /myadmin/;
        }

        # Admin SPA
        location /myadmin/ {
            proxy_pass https://d2noehnwpbne3f.cloudfront.net;  # CloudFront domain
            proxy_set_header Host d2noehnwpbne3f.cloudfront.net; # S3/CloudFront expects its host
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 10s;
            proxy_read_timeout 30s;

            # Handle WebSockets or long-lived requests if needed
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /api/ {
            proxy_pass http://api:5002/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /auth/ {
            proxy_pass http://keycloak:8080/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
