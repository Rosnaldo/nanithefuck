
services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - mongo
      - keycloak
      - certbot
    volumes:
      # Main nginx config
      - ./apps/nginx/prod/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./apps/nginx/prod/certs:/etc/nginx/certs:ro
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    networks:
      - frontend
      - backend

    certbot:
      image: certbot/certbot
      container_name: certbot
      volumes:
        - certbot_certs:/etc/letsencrypt
        - certbot_www:/var/www/certbot
      entrypoint: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; certbot renew; done'"

  api:
    image: api
    container_name: api
    build:
      context: .
      dockerfile: apps/api/dockerfile.prod
    expose:
      - "5002"
    env_file:
      - ./apps/api/.env
      - ./apps/api/.env.production
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
        restart: true
    networks:
      - frontend
      - backend
  
  postgres:
    image: postgres:18rc1
    pull_policy: always
    restart: no
    expose:
      - "5432"
    shm_size: 128m
    env_file :
      - ./apps/authentication/.env
    volumes:
      - prod_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $$POSTGRES_DB -U $$POSTGRES_USER"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    networks:
      - backend

  keycloak:
    container_name: keycloak_2
    image: quay.io/keycloak/keycloak:26.4
    pull_policy: always
    restart: no
    expose:
      - "8080"
    env_file :
      - ./apps/authentication/.env
      - ./apps/authentication/.env.production
    volumes:
      # Themes customizados
      - ./apps/authentication/my-themes:/opt/keycloak/themes
      - ./apps/authentication/realm-export.prod.json:/opt/keycloak/data/import/realm-export.json
    command: [
      "start", 
      "--spi-theme-cache-themes=false",
      "--spi-theme-cache-templates=false",
      "--spi-theme-static-max-age=-1",
      "--http-port=8080", 
      "--http-enabled=true",
      "--hostname-strict=false",
      "--hostname-debug=true",
      "--health-enabled=true",
      "--verbose",
      "--db=postgres",
      "--db-url=jdbc:postgresql://postgres:5432/$${DB_POSTGRES_SPACE}",
      "--db-password=$${DB_POSTGRES_PASSWORD}",
      "--db-username=$${DB_POSTGRES_USER}",
      "--import-realm",
    ]
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
    networks:
      - frontend
      - backend

  mongo:
    image: mongo:8.0.14-noble
    pull_policy: always
    restart: no
    expose:
      - "27017"
    env_file:
      - ./apps/api/.env.production
    volumes:
      - prod_mongodb_data:/data/db
    healthcheck:
      test: [ "CMD-SHELL", "mongosh --quiet --authenticationDatabase admin --username $${MONGO_INITDB_ROOT_USERNAME} --password $${MONGO_INITDB_ROOT_PASSWORD} localhost:27017/test --eval 'quit(db.runCommand({ ping: 1 }).ok ? 0 : 2)'" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s 
    networks:
      - backend

volumes:
  prod_postgres_data:
  prod_mongodb_data:
  certbot_certs:
  certbot_www:

networks:
  frontend:
  backend: